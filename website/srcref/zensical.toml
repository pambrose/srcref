[project]
site_name = "srcref"
site_description = "Dynamic line-specific GitHub permalinks using regex patterns"
site_author = "Paul Ambrose"
site_url = "https://www.srcref.com/"

copyright = """
Copyright &copy; 2026 Paul Ambrose
"""

# The repo_url adds a repository link/badge in the header
repo_url = "https://github.com/pambrose/srcref"
repo_name = "pambrose/srcref"
edit_uri = "edit/master/website/agentmail/docs/"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Query Parameters" = "query-parameters.md" },
  { "Regex Guide" = "regex-guide.md" },
  { "Programmatic API" = "api.md" },
  { "Advanced Usage" = "advanced-usage.md" },
  { "Deployment" = "deployment.md" },
  { "KDocs" = "kdocs.md" },
]

[project.theme]
language = "en"

features = [
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/pambrose/srcref"

[project.markdown_extensions.pymdownx.snippets]
base_path = ["../../"]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.attr_list]
