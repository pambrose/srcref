build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  TooManyFunctions:
    active: false
  NestedBlockDepth:
    active: true
    threshold: 6

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  ReturnCount:
    active: true
    max: 5
  ForbiddenComment:
    active: false
  UnusedPrivateMember:
    active: true
  UnusedParameter:
    active: true
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 4

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: true
  ThrowingExceptionsWithoutMessageOrCause:
    active: true

potential-bugs:
  active: true

performance:
  active: true

empty-blocks:
  active: true

coroutines:
  active: true
